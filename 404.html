<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <title>HeadHunting</title>
    <script type="text/javascript">
      // Truco estándar para SPA en GitHub Pages (BrowserRouter):
      // convierte /repo/dashboard -> /repo/?/dashboard y App.jsx lo recompone en index.html
      var pathSegmentsToKeep = 1; // 1 = mantiene "/nombre-repo" (cámbialo a 0 si usas un dominio propio en la raíz)
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
